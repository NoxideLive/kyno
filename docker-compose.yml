# Kyno local dev stack. Convex runs on the HOST — not in Docker:
#   npx convex dev --env-file .env.local
#
#   docker compose --env-file .env.local up -d
#   ./scripts/dev-init.sh
#
# BuildKit: DOCKER_BUILDKIT=1 COMPOSE_DOCKER_CLI_BUILD=1

services:
  vite:
    build:
      context: .
      dockerfile: docker/vite/Dockerfile
    env_file:
      - path: .env.local
        required: true
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/app
      - dev_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  phi-gateway:
    build:
      context: .
      dockerfile: services/phi-gateway/Dockerfile
      target: dev
    gpus: all
    env_file:
      - path: .env.local
        required: true
    environment:
      KYNO_REPO_ROOT: /app
      PHI_GATEWAY_PROFILE: ${PHI_GATEWAY_PROFILE:-medium}
      PHI_GATEWAY_JAILBREAK_MODEL: ${PHI_GATEWAY_JAILBREAK_MODEL:-}
      PHI_GATEWAY_DOMAIN_MODEL: ${PHI_GATEWAY_DOMAIN_MODEL:-}
      PHI_GATEWAY_PIPELINE_MODEL: ${PHI_GATEWAY_PIPELINE_MODEL:-}
      PHI_GATEWAY_GUARD_MODELS: ${PHI_GATEWAY_GUARD_MODELS:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
      PHI_MAX_SEQ_LENGTH: ${PHI_MAX_SEQ_LENGTH:-2048}
      PHI_CLASSIFY_MAX_SEQ_LENGTH: ${PHI_CLASSIFY_MAX_SEQ_LENGTH:-2048}
      PHI_CLASSIFY_CONCURRENCY: ${PHI_CLASSIFY_CONCURRENCY:-1}
      DOMAIN_CONFIDENCE_THRESHOLD: ${DOMAIN_CONFIDENCE_THRESHOLD:-0.4}
      PHI_LOAD_4BIT: ${PHI_LOAD_4BIT:-true}
      HF_HOME: /root/.cache/huggingface
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "${PHI_GATEWAY_PORT:-8090}:8090"
    volumes:
      - .:/app
      # Reuse host HF cache so Phi shards are not re-downloaded into an empty volume.
      - ${HF_CACHE_DIR:-${HOME}/.cache/huggingface}:/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'curl -sf http://localhost:8090/health | grep -q ''"status":"ok"''',
        ]
      interval: 30s
      timeout: 10s
      start_period: 300s
      retries: 5

volumes:
  dev_node_modules:
